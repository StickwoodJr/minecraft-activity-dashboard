<!DOCTYPE html>
<html lang=\"en\" data-theme=\"dark\">
  <head>
    <meta charset=\"UTF-8\" />
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
    <title>{{TAB_TITLE}}</title>
    <meta name=\"description\" content=\"{{DASHBOARD_DESCRIPTION}}\" />
    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">
    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>
    <link href=\"https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap\" rel=\"stylesheet\">
    <script src=\"https://cdn.jsdelivr.net/npm/chart.js\"></script>
    <script src=\"https://cdn.jsdelivr.net/npm/skinview3d@0.6.0/bundle/skinview3d.bundle.js\"></script>
    <style>
      :root {
        --color-bg: #0d0d0d;
        --color-surface: #1a1a1a;
        --color-surface-offset: #242424;
        --color-primary: #00d2ff;
        --color-primary-rgb: 0, 210, 255;
        --color-text: #ffffff;
        --color-text-muted: #a0a0a0;
        --color-text-faint: #606060;
        --color-border: rgba(255, 255, 255, 0.08);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --font-main: 'Plus Jakarta Sans', sans-serif;
        --font-heading: 'Outfit', sans-serif;
        --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.5);
        --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
      }
      
      [data-theme=\"light\"] {
        --color-bg: #f8f9fa;
        --color-surface: #ffffff;
        --color-surface-offset: #f1f3f5;
        --color-primary: #0084ff;
        --color-primary-rgb: 0, 132, 255;
        --color-text: #1a1a1a;
        --color-text-muted: #495057;
        --color-text-faint: #adb5bd;
        --color-border: rgba(0, 0, 0, 0.08);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }
      
      .container { max-width: 1200px; margin: 0 auto; padding: var(--space-8) var(--space-4); }

      /* Navbar */
      .navbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-8); }
      .brand { display: flex; align-items: center; gap: var(--space-4); }
      .brand img { height: 48px; border-radius: var(--radius-sm); }
      .brand h1 { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
      
      .nav-actions { display: flex; align-items: center; gap: var(--space-4); }
      .search-box { position: relative; width: 300px; }
      .search-box input { width: 100%; background: var(--color-surface); border: 1px solid var(--color-border); padding: 12px 16px 12px 40px; border-radius: 100px; color: #fff; font-size: 14px; transition: all 0.2s; }
      .search-box input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(var(--color-primary-rgb), 0.1); }
      .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--color-text-faint); }

      /* Tabs */
      .tabs { display: flex; gap: var(--space-2); background: var(--color-surface); padding: 6px; border-radius: 100px; border: 1px solid var(--color-border); margin-bottom: var(--space-8); }
      .tab-btn { padding: 10px 24px; border-radius: 100px; border: none; background: transparent; color: var(--color-text-muted); font-weight: 600; cursor: pointer; transition: all 0.2s; }
      .tab-btn.active { background: var(--color-primary); color: #000; box-shadow: 0 4px 12px rgba(var(--color-primary-rgb), 0.3); }

      /* Grid & Cards */
      .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-6); }
      .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); position: relative; overflow: hidden; }
      
      /* Heatmap Custom */
      .heatmap-container { display: flex; flex-direction: column; gap: 1rem; }
      .heatmap-inner { display: grid; grid-template-columns: repeat(53, 1fr); gap: 4px; }
      .day-cell { aspect-ratio: 1; border-radius: 3px; background: rgba(255,255,255,0.03); cursor: pointer; transition: transform 0.1s; }
      .day-cell:hover { transform: scale(1.15); z-index: 10; }
      
      /* Level Colors - Modern Gradient */
      .lvl-0 { background: rgba(255,255,255,0.03); }
      .lvl-1 { background: oklch(from var(--color-primary) 0.3 0.1 h); }
      .lvl-2 { background: oklch(from var(--color-primary) 0.5 0.15 h); }
      .lvl-3 { background: oklch(from var(--color-primary) 0.7 0.2 h); }
      .lvl-4 { background: var(--color-primary); }

      /* Leaderboard */
      .lb-list { display: flex; flex-direction: column; gap: var(--space-3); }
      .lb-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3); background: var(--color-surface-offset); border-radius: var(--radius-md); transition: all 0.2s; cursor: pointer; }
      .lb-item:hover { transform: translateX(4px); background: rgba(var(--color-primary-rgb), 0.05); }
      .player-head { width: 32px; height: 32px; border-radius: 4px; }
      
      /* Rank Badges */
      .rank-badge { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 800; font-size: 12px; }
      .rank-1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
      .rank-2 { background: linear-gradient(135deg, #e0e0e0, #909090); color: #000; }
      .rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #000; }

      /* Animations */
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade { animation: slideUp 0.4s ease-out forwards; }

      /* Modal */
      .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; }
      .modal-overlay.visible { display: flex; }
      .modal-content { background: var(--color-surface); width: 1000px; max-width: 95vw; height: 750px; border-radius: var(--radius-lg); border: 1px solid var(--color-border); overflow: hidden; display: grid; grid-template-columns: 350px 1fr; }
      
      /* Mobile */
      @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr; }
        .modal-content { grid-template-columns: 1fr; height: auto; max-height: 90vh; overflow-y: auto; }
      }
    </style>
  </head>
  <body>
    <div class=\"container\">
      <nav class=\"navbar\">
        <div class=\"brand\">
          <img src=\"/logo.png\" alt=\"Logo\" onerror=\"this.style.display='none'\" />
          <h1>{{SERVER_NAME}}</h1>
        </div>
        <div class=\"nav-actions\">
          <div class=\"search-box\">
            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"></circle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"></line></svg>
            <input type=\"text\" placeholder=\"Search player (Ctrl+K)\" id=\"headerSearchInput\" />
            <div id=\"headerSearchResults\" class=\"search-results\"></div>
          </div>
        </div>
      </nav>

      <div class=\"tabs\">
        <button class=\"tab-btn active\" id=\"tabPlaytime\">Activity</button>
        <button class=\"tab-btn\" id=\"tabLeaderboards\">Leaderboards</button>
        <button class=\"tab-btn\" id=\"tabEvents\">Events</button>
        <button class=\"tab-btn\" id=\"tabLive\" style=\"{{LIVE_TAB_DISPLAY}}\">Live</button>
        <button class=\"tab-btn\" id=\"tabDynmap\" style=\"display:none\">Map</button>
      </div>

      <main id=\"viewPlaytime\" class=\"animate-fade\">
        <div class=\"dashboard-grid\">
          <div class=\"card\">
            <div class=\"card-header\">
              <h2>Server Activity</h2>
            </div>
            <div class=\"heatmap-container\">
              <div class=\"heatmap-inner\" id=\"heatmapBody\"></div>
            </div>
          </div>
          
          <div class=\"card\">
            <h2>Top Players</h2>
            <div class=\"lb-list\" id=\"topPlayersList\"></div>
          </div>
        </div>
      </main>

      <div id=\"viewLeaderboards\" style=\"display:none;\"></div>
      <div id=\"viewEvents\" style=\"display:none;\"></div>
      <div id=\"viewLive\" style=\"display:none;\"></div>
      <div id=\"viewDynmap\" style=\"display:none;\">
        <iframe id=\"dynmapFrame\" src=\"about:blank\" style=\"width:100%; height:800px; border:none; border-radius:var(--radius-lg);\"></iframe>
      </div>
    </div>

    <!-- Player Modal -->
    <div class=\"modal-overlay\" id=\"playerModal\">
      <div class=\"modal-content\">
        <div class=\"modal-sidebar\">
          <canvas id=\"skinViewerCanvas\"></canvas>
        </div>
        <div class=\"modal-body\">
          <div class=\"modal-header\">
             <div id=\"modalPlayerHead\"></div>
             <h2 id=\"modalPlayerName\">Stickwood</h2>
          </div>
          <div class=\"stats-grid\" id=\"modalStats\"></div>
          <div class=\"tabs-mini\">
             <button class=\"mini-tab active\">Stats</button>
             <button class=\"mini-tab\">Timeline</button>
          </div>
          <div id=\"modalIngameStats\"></div>
        </div>
      </div>
    </div>

    <script>
      // Global State
      let daily = {}, playerDailyRaw = {}, sessData = {}, hourly = {}, ranked = [], playerTotals = {};
      let PLAYER_META = {}, PLAYER_ALIASES = {}, ignoredPlayers = [];
      let liveState = null;
      let eventsData = null;
      let selectedDateStr = null;
      
      const isUUID = (s) => /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
      const fmtHours = (h) => h < 1 ? Math.round(h * 60) + 'm' : h.toFixed(1) + 'h';
      const playerHead = (name, size=32) => `<img src=\"/faces/${encodeURIComponent(name)}.png\" class=\"player-head\" width=\"${size}\" height=\"${size}\" onerror=\"this.src='/faces/default_head.png'\">`;
      const rankClass = ['rank-1', 'rank-2', 'rank-3'];

      // --- Core Logic ---

      async function loadActivity() {
        try {
          const resMeta = await fetch('/api/player-meta'); PLAYER_META = await resMeta.json();
          const resAct = await fetch('/api/activity'); const data = await resAct.json();
          
          ignoredPlayers = (data.ignored_players || []).map(s => s.toLowerCase());
          
          // Build Alias Map
          const rawAliases = data.player_aliases || {};
          PLAYER_ALIASES = {};
          for (const [k, v] of Object.entries(rawAliases)) PLAYER_ALIASES[k.toLowerCase()] = v;

          const normalize = (p) => {
            if (!p) return '';
            const trimmed = p.trim();
            const aliased = PLAYER_ALIASES[trimmed.toLowerCase()];
            return aliased !== undefined ? aliased : trimmed;
          };

          // Process & Merge Data
          playerDailyRaw = {};
          for (let date in data.playerDailyRaw) {
            playerDailyRaw[date] = {};
            for (let p in data.playerDailyRaw[date]) {
              const n = normalize(p);
              if (n && !isUUID(n) && !ignoredPlayers.includes(n.toLowerCase())) {
                playerDailyRaw[date][n] = (playerDailyRaw[date][n] || 0) + data.playerDailyRaw[date][p];
              }
            }
          }

          // Compute Totals & Ranked
          playerTotals = {};
          Object.values(playerDailyRaw).forEach(day => {
            Object.entries(day).forEach(([p, m]) => playerTotals[p] = (playerTotals[p] || 0) + m);
          });
          ranked = Object.entries(playerTotals).sort((a, b) => b[1] - a[1]);

          renderHeatmap();
          renderTopPlayers();
          initSearch();
        } catch (e) { console.error(\"Load failed\", e); }
      }

      function renderHeatmap() {
        const body = document.getElementById('heatmapBody');
        // Simplified heatmap logic for demo
        body.innerHTML = Array.from({length: 365}).map((_, i) => `<div class=\"day-cell lvl-${Math.floor(Math.random()*5)}\"></div>`).join('');
      }

      function renderTopPlayers() {
        const list = document.getElementById('topPlayersList');
        list.innerHTML = ranked.slice(0, 10).map(([name, mins], i) => `
          <div class=\"lb-item\" onclick=\"showPlayerDetails('${name}')\">
            <div style=\"display:flex; align-items:center; gap:12px;\">
               <span class=\"rank-badge ${rankClass[i] || ''}\">${i+1}</span>
               ${playerHead(name)}
               <span style=\"font-weight:600;\">${name}</span>
            </div>
            <span style=\"color:var(--color-primary); font-weight:700;\">${fmtHours(mins/60)}</span>
          </div>
        `).join('');
      }

      function showPlayerDetails(name) {
        document.getElementById('modalPlayerName').textContent = name;
        document.getElementById('modalPlayerHead').innerHTML = playerHead(name, 48);
        document.getElementById('playerModal').classList.add('visible');
        
        // Skin Viewer
        if (window.skinViewer) window.skinViewer.loadSkin(`/skins/${encodeURIComponent(name)}.png`);
      }

      // Init
      window.addEventListener('DOMContentLoaded', () => {
        loadActivity();
        const skinCanvas = document.getElementById('skinViewerCanvas');
        window.skinViewer = new skinview3d.SkinViewer({ canvas: skinCanvas, width: 350, height: 500 });
      });

      document.getElementById('playerModal').addEventListener('click', (e) => {
        if (e.target.id === 'playerModal') e.target.classList.remove('visible');
      });
    </script>
  </body>
</html>
